<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>YouTube Clone</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body {
    margin: 0;
    background: #0f0f0f;
    color: #fff;
    font-family: "Roboto", Arial, sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  /* Top bar */
  #topbar {
    height: 56px;
    background: #0f0f0f;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
  }

  #homeBtn {
    background: none;
    border: none;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
  }

  #searchInput {
    flex: 1;
    padding: 10px 14px;
    border-radius: 999px;
    border: none;
    outline: none;
    background: #121212;
    color: #fff;
  }

  #searchBtn {
    padding: 10px 16px;
    border-radius: 999px;
    border: none;
    background: #ff0000;
    color: #fff;
    cursor: pointer;
  }

  /* Layout container */
  #container {
    display: flex;
    height: calc(100vh - 56px);
    overflow: hidden;
  }

  /* WATCH PAGE */
  #watchPage {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  iframe {
    flex: 1;
    width: 100%;
    border: 0;
  }

  /* SIDEBAR */
  #sidebar {
    width: 360px;
    background: #0f0f0f;
    border-left: 1px solid #222;
    overflow-y: auto;
    display: block;
  }

  #results {
    padding: 10px;
  }

  .item {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
    cursor: pointer;
  }

  .thumb-wrapper {
    position: relative;
  }

  .thumb {
    width: 210px;
    height: 118px;
    border-radius: 10px;
    object-fit: cover;
    transition: filter 0.2s ease;
  }

  .item:hover .thumb {
    filter: brightness(1.15);
  }

  .duration {
    position: absolute;
    bottom: 6px;
    right: 6px;
    background: rgba(0,0,0,0.85);
    padding: 2px 6px;
    font-size: 12px;
    border-radius: 4px;
  }

  .meta {
    flex: 1;
  }

  .title {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .channel-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }

  .channel-icon {
    width: 24px;
    height: 24px;
    border-radius: 50%;
  }

  .channel-name {
    font-size: 13px;
    color: #aaa;
  }

  .stats {
    font-size: 12px;
    color: #888;
  }

  /* FOR YOU PAGE */
  #forYouPage {
    display: none;
    width: 100%;
    height: 100%;
    overflow-y: auto;
    padding: 20px;
  }

  #forYouGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .fy-card {
    cursor: pointer;
  }

  .fy-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 12px;
    object-fit: cover;
  }

  .fy-title {
    font-size: 16px;
    font-weight: 500;
    margin-top: 8px;
  }

  .fy-channel {
    font-size: 14px;
    color: #aaa;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div id="topbar">
  <button id="homeBtn">🏠</button>
  <input id="searchInput" placeholder="Search YouTube (via Proxy)">
  <button id="searchBtn">Search</button>
</div>

<div id="container">

  <!-- WATCH PAGE -->
  <div id="watchPage">
    <iframe id="player" allowfullscreen></iframe>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="results"></div>
  </div>

  <!-- FOR YOU PAGE -->
  <div id="forYouPage">
    <h2>For You</h2>
    <div id="forYouGrid"></div>
  </div>

</div>

<script>
/* Save watch history */
function saveHistory(video) {
  let history = JSON.parse(localStorage.getItem("history") || "[]");
  history.unshift(video);
  history = history.slice(0, 200);
  localStorage.setItem("history", JSON.stringify(history));
}

/* Load video */
function loadVideo(id, meta) {
  document.getElementById("player").src =
    "https://www.youtube.com/embed/" + id;

  if (meta) saveHistory(meta);

  showWatchPage();
}

/* Search */
async function search() {
  const q = document.getElementById("searchInput").value.trim();
  if (!q) return;

  const api =
    "https://testerprox.vercel.app/api/search?q=" +
    encodeURIComponent(q);

  const data = await (await fetch(api)).json();

  const results = document.getElementById("results");
  results.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="thumb-wrapper">
        <img class="thumb" src="${item.thumb}">
        <div class="duration">${item.duration}</div>
      </div>

      <div class="meta">
        <div class="title">${item.title}</div>

        <div class="channel-row">
          <img class="channel-icon" src="${item.channelIcon}">
          <div class="channel-name">${item.channel}</div>
        </div>

        <div class="stats">${item.views} • ${item.uploaded}</div>
      </div>
    `;

    div.onclick = () => {
      loadVideo(item.id, item);
    };

    results.appendChild(div);
  });
}

/* FOR YOU PAGE */
function showForYou() {
  document.getElementById("watchPage").style.display = "none";
  document.getElementById("sidebar").style.display = "none";

  const fy = document.getElementById("forYouPage");
  fy.style.display = "block";

  const grid = document.getElementById("forYouGrid");
  grid.innerHTML = "";

  const history = JSON.parse(localStorage.getItem("history") || "[]");

  history.forEach(item => {
    const card = document.createElement("div");
    card.className = "fy-card";

    card.innerHTML = `
      <img class="fy-thumb" src="${item.thumb}">
      <div class="fy-title">${item.title}</div>
      <div class="fy-channel">${item.channel}</div>
    `;

    card.onclick = () => loadVideo(item.id, item);

    grid.appendChild(card);
  });
}

/* WATCH PAGE */
function showWatchPage() {
  document.getElementById("watchPage").style.display = "flex";
  document.getElementById("sidebar").style.display = "block";
  document.getElementById("forYouPage").style.display = "none";
}

/* Events */
document.getElementById("searchBtn").onclick = search;
document.getElementById("searchInput").addEventListener("keydown", e => {
  if (e.key === "Enter") search();
});

document.getElementById("homeBtn").onclick = showForYou;
</script>

</body>
</html>
