<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>YT Viewer</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  #top {
    padding: 12px;
    text-align: center;
    background: #111;
  }
  #u {
    width: 70%;
    max-width: 640px;
    padding: 8px 12px;
    font-size: 15px;
    border-radius: 999px;
    border: none;
    outline: none;
  }
  #btn {
    padding: 8px 14px;
    margin-left: 8px;
    font-size: 15px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    background: #ff0000;
    color: #fff;
  }
  iframe {
    flex: 1;
    width: 100%;
    border: 0;
  }
</style>
</head>
<body>

<div id="top">
  <input id="u" placeholder="Paste YouTube URL and press Enter">
  <button id="btn">Load</button>
</div>

<iframe id="p" allowfullscreen></iframe>

<script>
// Extract video ID
function getId(url) {
  try {
    const u = new URL(url);
    if (u.hostname.includes('youtu.be')) return u.pathname.slice(1);
    if (u.searchParams.get('v')) return u.searchParams.get('v');
  } catch (e) {}
  const m = url.match(/v=([^&]+)/) || url.match(/youtu\.be\/([^?]+)/);
  return m ? m[1] : null;
}

// Load video
function loadVideo(id) {
  document.getElementById('p').src =
    "https://www.youtube.com/embed/" + encodeURIComponent(id);
}

// Load from pasted URL
function loadFromInput() {
  const val = document.getElementById('u').value.trim();
  const id = getId(val);
  if (!id) return alert("Invalid URL");
  loadVideo(id);
}

document.getElementById('btn').onclick = loadFromInput;
document.getElementById('u').addEventListener('keydown', e => {
  if (e.key === "Enter") loadFromInput();
});
</script>

</body>
</html>
