<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>YouTube Proxy Viewer</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: system-ui, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Hamburger toggle */
  #toggleSidebar {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 9999;
    background: #222;
    color: #fff;
    border: none;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 18px;
  }

  /* Sidebar */
  #sidebar {
    width: 320px;
    background: #111;
    padding: 10px;
    padding-top: 60px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-right: 2px solid #222;
    height: 100vh;
    overflow-y: auto;
    position: absolute;
    left: 0;
    top: 0;
    transition: transform 0.25s ease;
    transform: translateX(0);
    z-index: 15;
  }

  #sidebar.hidden {
    transform: translateX(-320px);
  }

  #s {
    width: 100%;
    padding: 8px 12px;
    border-radius: 999px;
    border: none;
    outline: none;
  }

  #sbtn {
    padding: 8px 12px;
    border-radius: 999px;
    border: none;
    background: #ff0000;
    color: #fff;
    cursor: pointer;
  }

  #results {
    flex: 1;
    overflow-y: auto;
    border-top: 1px solid #222;
  }

  .item {
    padding: 10px;
    cursor: pointer;
    border-bottom: 1px solid #222;
  }

  .thumb {
    width: 160px;
    height: 90px;
    border-radius: 6px;
    object-fit: cover;
  }

  /* Main player area */
  #main {
    flex: 1;
    margin-left: 320px;
    transition: margin-left 0.25s ease;
    display: flex;
    flex-direction: column;
  }

  #main.full {
    margin-left: 0;
  }

  #u {
    width: 60%;
    max-width: 500px;
    margin: 10px auto;
    padding: 8px 12px;
    border-radius: 999px;
    border: none;
    outline: none;
  }

  #btn {
    padding: 8px 12px;
    border-radius: 999px;
    border: none;
    background: #ff0000;
    color: #fff;
    cursor: pointer;
    margin: 0 auto 10px;
  }

  iframe {
    flex: 1;
    width: 100%;
    border: 0;
  }
</style>
</head>
<body>

<button id="toggleSidebar">☰</button>

<div id="sidebar">
  <input id="s" placeholder="Search YouTube (via Proxy)">
  <button id="sbtn">Search</button>
  <div id="results"></div>
</div>

<div id="main">
  <input id="u" placeholder="Paste YouTube URL and press Enter">
  <button id="btn">Load</button>
  <iframe id="p" allowfullscreen></iframe>
</div>

<script>
/* Extract video ID */
function getId(url) {
  try {
    const u = new URL(url);
    if (u.hostname.includes("youtu.be")) return u.pathname.slice(1);
    if (u.searchParams.get("v")) return u.searchParams.get("v");
  } catch (e) {}
  const m = url.match(/v=([^&]+)/) || url.match(/youtu\.be\/([^?]+)/);
  return m ? m[1] : null;
}

/* Load video */
function loadVideo(id) {
  document.getElementById("p").src =
    "https://www.youtube.com/embed/" + encodeURIComponent(id);
}

/* Load from pasted URL */
function loadFromInput() {
  const val = document.getElementById("u").value.trim();
  const id = getId(val);
  if (!id) return alert("Invalid URL");
  loadVideo(id);
}

document.getElementById("btn").onclick = loadFromInput;
document.getElementById("u").addEventListener("keydown", e => {
  if (e.key === "Enter") loadFromInput();
});

/* Search using your Vercel proxy */
async function search() {
  const q = document.getElementById("s").value.trim();
  if (!q) return;

  const api =
    "https://testerprox.vercel.app/api/search?q=" +
    encodeURIComponent(q);

  const data = await (await fetch(api)).json();

  const results = document.getElementById("results");
  results.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div style="display:flex; gap:10px;">
        <img class="thumb" src="${item.thumb}">
        <div style="flex:1;">
          <div style="font-size:14px; font-weight:600; color:#fff;">
            ${item.title}
          </div>

          <div style="display:flex; align-items:center; gap:6px; margin-top:4px;">
            <img src="${item.channelIcon}" style="width:20px; height:20px; border-radius:50%;">
            <span style="font-size:12px; color:#aaa;">${item.channel}</span>
          </div>

          <div style="font-size:12px; color:#888; margin-top:2px;">
            ${item.duration}
          </div>
        </div>
      </div>
    `;

    div.onclick = () => {
      loadVideo(item.id);
      document.getElementById("sidebar").classList.add("hidden");
      document.getElementById("main").classList.add("full");
    };

    results.appendChild(div);
  });
}

document.getElementById("sbtn").onclick = search;
document.getElementById("s").addEventListener("keydown", e => {
  if (e.key === "Enter") search();
});

/* Sidebar toggle */
document.getElementById("toggleSidebar").onclick = () => {
  const sidebar = document.getElementById("sidebar");
  const main = document.getElementById("main");

  const hidden = sidebar.classList.toggle("hidden");
  main.classList.toggle("full", hidden);
};
</script>

</body>
</html>
