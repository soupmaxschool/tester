<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>YouTube Watch Clone</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body {
    margin: 0;
    background: #0f0f0f;
    color: #fff;
    font-family: "Roboto", Arial, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Sidebar toggle */
  #toggleSidebar {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 9999;
    background: #272727;
    color: #fff;
    border: none;
    padding: 8px 12px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
  }

  /* Sidebar (Recommended videos) */
  #sidebar {
    width: 360px;
    background: #0f0f0f;
    padding: 0;
    padding-top: 60px;
    border-left: 1px solid #222;
    height: 100vh;
    overflow-y: auto;
    position: absolute;
    right: 0;
    top: 0;
    transition: transform 0.25s ease;
    transform: translateX(0);
    z-index: 15;
  }

  #sidebar.hidden {
    transform: translateX(360px);
  }

  #results {
    padding: 10px;
  }

  .item {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
    cursor: pointer;
  }

  .thumb-wrapper {
    position: relative;
  }

  .thumb {
    width: 210px;
    height: 118px;
    border-radius: 10px;
    object-fit: cover;
    transition: filter 0.2s ease;
  }

  .item:hover .thumb {
    filter: brightness(1.15);
  }

  .duration {
    position: absolute;
    bottom: 6px;
    right: 6px;
    background: rgba(0,0,0,0.85);
    padding: 2px 6px;
    font-size: 12px;
    border-radius: 4px;
  }

  .meta {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }

  .title {
    font-size: 15px;
    font-weight: 500;
    color: #fff;
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .channel-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }

  .channel-icon {
    width: 24px;
    height: 24px;
    border-radius: 50%;
  }

  .channel-name {
    font-size: 13px;
    color: #aaa;
  }

  .stats {
    font-size: 12px;
    color: #888;
  }

  /* Main player area */
  #main {
    flex: 1;
    margin-right: 360px;
    transition: margin-right 0.25s ease;
    display: flex;
    flex-direction: column;
  }

  #main.full {
    margin-right: 0;
  }

  #searchBar {
    display: flex;
    gap: 10px;
    padding: 12px;
    background: #0f0f0f;
    border-bottom: 1px solid #222;
  }

  #s {
    flex: 1;
    padding: 10px 14px;
    border-radius: 999px;
    border: none;
    outline: none;
    background: #121212;
    color: #fff;
  }

  #sbtn {
    padding: 10px 16px;
    border-radius: 999px;
    border: none;
    background: #ff0000;
    color: #fff;
    cursor: pointer;
  }

  iframe {
    flex: 1;
    width: 100%;
    border: 0;
  }
</style>
</head>
<body>

<button id="toggleSidebar">☰</button>

<div id="main">
  <div id="searchBar">
    <input id="s" placeholder="Search YouTube (via Proxy)">
    <button id="sbtn">Search</button>
  </div>
  <iframe id="p" allowfullscreen></iframe>
</div>

<div id="sidebar">
  <div id="results"></div>
</div>

<script>
/* Extract video ID */
function getId(url) {
  try {
    const u = new URL(url);
    if (u.hostname.includes("youtu.be")) return u.pathname.slice(1);
    if (u.searchParams.get("v")) return u.searchParams.get("v");
  } catch (e) {}
  const m = url.match(/v=([^&]+)/) || url.match(/youtu\.be\/([^?]+)/);
  return m ? m[1] : null;
}

/* Load video */
function loadVideo(id) {
  document.getElementById("p").src =
    "https://www.youtube.com/embed/" + encodeURIComponent(id);
}

/* Search using your Vercel proxy */
async function search() {
  const q = document.getElementById("s").value.trim();
  if (!q) return;

  const api =
    "https://testerprox.vercel.app/api/search?q=" +
    encodeURIComponent(q);

  const data = await (await fetch(api)).json();

  const results = document.getElementById("results");
  results.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="thumb-wrapper">
        <img class="thumb" src="${item.thumb}">
        <div class="duration">${item.duration}</div>
      </div>

      <div class="meta">
        <div class="title">${item.title}</div>

        <div class="channel-row">
          <img class="channel-icon" src="${item.channelIcon}">
          <div class="channel-name">${item.channel}</div>
        </div>

        <div class="stats">${item.views} • ${item.uploaded}</div>
      </div>
    `;

    div.onclick = () => {
      loadVideo(item.id);
    };

    results.appendChild(div);
  });
}

document.getElementById("sbtn").onclick = search;
document.getElementById("s").addEventListener("keydown", e => {
  if (e.key === "Enter") search();
});

/* Sidebar toggle */
document.getElementById("toggleSidebar").onclick = () => {
  const sidebar = document.getElementById("sidebar");
  const main = document.getElementById("main");

  const hidden = sidebar.classList.toggle("hidden");
  main.classList.toggle("full", hidden);
};
</script>

</body>
</html>
