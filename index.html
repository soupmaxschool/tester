<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>YT Viewer + Built‑In Search</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  #top {
    padding: 12px;
    text-align: center;
    background: #111;
  }
  #s {
    width: 70%;
    max-width: 600px;
    padding: 8px 12px;
    font-size: 15px;
    border-radius: 999px;
    border: none;
    outline: none;
  }
  #sbtn {
    padding: 8px 14px;
    font-size: 15px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    background: #ff0000;
    color: #fff;
  }
  iframe {
    flex: 1;
    width: 100%;
    border: 0;
  }
</style>
</head>
<body>

<div id="top">
  <input id="s" placeholder="Search YouTube">
  <button id="sbtn">Search</button>
</div>

<iframe id="frame" src="https://m.youtube.com"></iframe>

<script>
function search() {
  const q = document.getElementById('s').value.trim();
  if (!q) return;

  // ⭐ Load YouTube search page directly
  document.getElementById('frame').src =
    "https://m.youtube.com/results?search_query=" + encodeURIComponent(q);
}

document.getElementById('sbtn').onclick = search;
document.getElementById('s').addEventListener('keydown', e => {
  if (e.key === "Enter") search();
});
</script>

</body>
</html>
