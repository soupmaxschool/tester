<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>YT Viewer + Search</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  #top {
    padding: 12px;
    text-align: center;
    background: #111;
  }
  #u, #s {
    width: 60%;
    max-width: 600px;
    padding: 8px 12px;
    font-size: 15px;
    border-radius: 999px;
    border: none;
    outline: none;
    margin: 4px;
  }
  #btn, #sbtn {
    padding: 8px 14px;
    font-size: 15px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    background: #ff0000;
    color: #fff;
    margin: 4px;
  }
  #results {
    background: #111;
    padding: 10px;
    overflow-y: auto;
    max-height: 40vh;
  }
  .item {
    display: flex;
    gap: 10px;
    padding: 8px;
    cursor: pointer;
    border-bottom: 1px solid #222;
  }
  .item img {
    width: 120px;
    height: 68px;
    object-fit: cover;
    border-radius: 6px;
  }
  iframe {
    flex: 1;
    width: 100%;
    border: 0;
  }
</style>
</head>
<body>

<div id="top">
  <input id="u" placeholder="Paste YouTube URL and press Enter">
  <button id="btn">Load</button>
  <br>
  <input id="s" placeholder="Search YouTube">
  <button id="sbtn">Search</button>
</div>

<div id="results"></div>

<iframe id="p" allowfullscreen></iframe>

<script>
// Extract video ID from URL
function getId(url) {
  try {
    const u = new URL(url);
    if (u.hostname.includes('youtu.be')) return u.pathname.slice(1);
    if (u.searchParams.get('v')) return u.searchParams.get('v');
  } catch (e) {}
  const m = url.match(/v=([^&]+)/) || url.match(/youtu\.be\/([^?]+)/);
  return m ? m[1] : null;
}

// Load video into iframe
function loadVideo(id) {
  document.getElementById('p').src =
    "https://www.youtube.com/embed/" + encodeURIComponent(id);
}

// Load from pasted URL
function loadFromInput() {
  const val = document.getElementById('u').value.trim();
  const id = getId(val);
  if (!id) return alert("Invalid URL");
  loadVideo(id);
}

document.getElementById('btn').onclick = loadFromInput;
document.getElementById('u').addEventListener('keydown', e => {
  if (e.key === "Enter") loadFromInput();
});

// ⭐ WORKING SEARCH (Piped API)
async function search() {
  const q = document.getElementById('s').value.trim();
  if (!q) return;

  const api =
    "https://pipedapi.kavin.rocks/search?q=" +
    encodeURIComponent(q);

  const data = await (await fetch(api)).json();

  const results = document.getElementById('results');
  results.innerHTML = "";

  data.items
    .filter(v => v.type === "video")
    .slice(0, 12)
    .forEach(v => {
      const div = document.createElement('div');
      div.className = "item";
      div.innerHTML = `
        <img src="${v.thumbnail}" />
        <div>
          <b>${v.title}</b><br>
          <small>${v.uploaderName}</small>
        </div>
      `;
      div.onclick = () => loadVideo(v.id);
      results.appendChild(div);
    });
}

document.getElementById('sbtn').onclick = search;
document.getElementById('s').addEventListener('keydown', e => {
  if (e.key === "Enter") search();
});
</script>

</body>
</html>
